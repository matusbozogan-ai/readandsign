version: '3.9'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: readandsign
      POSTGRES_USER: ras
      POSTGRES_PASSWORD: ras_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ras -d readandsign"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://ras:ras_secret@db:5432/readandsign
      JWT_SECRET: change_me_in_production_jwt_secret_32chars
      SIGNING_SECRET: change_me_signing_secret
      UPLOAD_DIR: /uploads
      SEED: "${SEED:-false}"   # run with SEED=true once to load demo data
      NODE_ENV: production
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: "noreply@readandsign.app"
      SMTP_SECURE: "false"
      APP_URL: "http://localhost"
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads:
