services:
  - type: web
    name: readandsign-backend
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: readandsign-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: SIGNING_SECRET
        sync: false
      - key: APP_URL
        sync: false

  - type: web
    name: readandsign-frontend
    runtime: docker
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://readandsign-backend.onrender.com

databases:
  - name: readandsign-db
    plan: free
    databaseName: readandsign
    user: readandsign
    postgresMajorVersion: 16
